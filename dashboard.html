<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recallify - Knowledge Retention Dashboard</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ========== RESET AND BASE STYLES ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        /* ========== HEADER ========== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 40px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 28px;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info a {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .user-info a:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        /* ========== MAIN CONTAINER ========== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ========== TABS ========== */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.8);
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #555;
        }

        .tab-btn.active {
            background: white;
            color: #667eea;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .tab-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        /* ========== TAB CONTENT ========== */
        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== FLASHCARD SECTION ========== */
        .flashcard-wrapper {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        .flashcard {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .flashcard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .flashcard-topic {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .flashcard-counter {
            color: #999;
            font-size: 14px;
            font-weight: 500;
        }

        .flashcard-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }

        .flashcard-text {
            font-size: 20px;
            color: #333;
            line-height: 1.6;
            text-align: center;
        }

        .flashcard-source {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
            font-style: italic;
        }

        .progress-track {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 999px;
            overflow: hidden;
            margin-top: 12px;
        }

        .progress-track-fill {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #667eea 0%, #22c55e 100%);
            transition: width 0.4s ease;
        }

        .flashcard-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .forgot-btn, .remembered-btn {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .forgot-btn {
            background: #fee;
            color: #e53e3e;
        }

        .forgot-btn:hover {
            background: #fdd;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229, 62, 62, 0.3);
        }

        .remembered-btn {
            background: #efe;
            color: #38a169;
        }

        .remembered-btn:hover {
            background: #dfd;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 161, 105, 0.3);
        }

        .no-flashcards {
            background: white;
            border-radius: 15px;
            padding: 60px 40px;
            text-align: center;
            color: #999;
            font-size: 18px;
        }

        .flashcard-controls {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .add-flashcard-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .add-flashcard-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .add-flashcard-btn:active {
            transform: translateY(0);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .flashcard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .flashcard-topic {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .flashcard-counter {
            color: #999;
            font-size: 14px;
            font-weight: 500;
        }

        .flashcard-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }

        .flashcard-text {
            font-size: 20px;
            color: #333;
            line-height: 1.6;
            text-align: center;
        }

        .flashcard-source {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
            font-style: italic;
        }

        .flashcard-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .forgot-btn, .remembered-btn {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .forgot-btn {
            background: #fee;
            color: #e53e3e;
        }

        .forgot-btn:hover {
            background: #fdd;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229, 62, 62, 0.3);
        }

        .remembered-btn {
            background: #efe;
            color: #38a169;
        }

        .remembered-btn:hover {
            background: #dfd;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 161, 105, 0.3);
        }

        .no-flashcards {
            background: white;
            border-radius: 15px;
            padding: 60px 40px;
            text-align: center;
            color: #999;
            font-size: 18px;
        }

        /* ========== KNOWLEDGE MAP ========== */
        .knowledge-map {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .knowledge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .knowledge-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            color: white;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .knowledge-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .knowledge-card.weak {
            background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
        }

        .knowledge-card.medium {
            background: linear-gradient(135deg, #3b82f6 0%, #667eea 100%);
        }

        .knowledge-card.strong {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .knowledge-card-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .knowledge-card-title {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .knowledge-card-count {
            font-size: 12px;
            opacity: 0.9;
        }

        .knowledge-card-strength {
            font-size: 11px;
            margin-top: 8px;
            opacity: 0.8;
        }

        /* ========== SEARCH SECTION ========== */
        .search-container {
            background: white;
            border-radius: 15px;
            padding: 30px 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .search-header {
            margin-bottom: 25px;
        }

        .search-header h2 {
            color: #333;
            margin-bottom: 8px;
            font-size: 24px;
        }

        .search-header p {
            color: #666;
            font-size: 14px;
        }

        .search-input-wrapper {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }

        .search-input-wrapper input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .search-input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-input-wrapper button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-input-wrapper button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .search-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e1e5e9;
            background: white;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #666;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .search-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e5e7eb;
        }

        .search-stats span {
            font-size: 14px;
            color: #666;
        }

        .search-results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .result-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .result-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .result-card-topic {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 10px;
        }

        .result-card-text {
            font-size: 14px;
            line-height: 1.5;
            color: #555;
            margin: 10px 0;
        }

        .result-card-source {
            font-size: 12px;
            color: #999;
            font-style: italic;
        }

        .result-card-stats {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }

        .retention-badge {
            background: linear-gradient(90deg, #22c55e 0%, #10b981 100%);
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .retention-badge.low {
            background: linear-gradient(90deg, #f59e0b 0%, #f97316 100%);
        }

        .retention-badge.medium {
            background: linear-gradient(90deg, #3b82f6 0%, #667eea 100%);
        }

        .retention-badge.high {
            background: linear-gradient(90deg, #22c55e 0%, #10b981 100%);
        }

        .no-results {
            text-align: center;
            color: #999;
            padding: 60px 40px;
            font-size: 18px;
            grid-column: 1 / -1;
        }

        .no-results i {
            font-size: 48px;
            margin-bottom: 20px;
            display: block;
            color: #ddd;
        }

        .search-suggestions {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #22c55e;
        }

        .search-suggestions h4 {
            margin-bottom: 10px;
            color: #333;
            font-size: 14px;
        }

        .suggestion-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .suggestion-tag {
            background: #e5e7eb;
            color: #666;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .suggestion-tag:hover {
            background: #667eea;
            color: white;
        }

        .suggestion-group {
            margin-bottom: 10px;
        }

        .suggestion-group strong {
            color: #333;
            font-size: 14px;
            margin-right: 10px;
            display: inline-block;
            min-width: 60px;
        }

        .result-card-text {
            font-size: 14px;
            line-height: 1.5;
            color: #555;
            margin: 10px 0;
        }

        .result-card-source {
            font-size: 12px;
            color: #999;
            font-style: italic;
        }

        .no-results {
            text-align: center;
            color: #999;
            padding: 40px;
            font-size: 18px;
        }

        /* ========== RETENTION SCORE SECTION ========== */
        .retention-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .retention-card {
            background: white;
            border-radius: 15px;
            padding: 30px 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .retention-card h3 {
            margin-bottom: 25px;
            color: #333;
            font-size: 18px;
        }

        .circular-progress {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 30px 0;
            position: relative;
            width: 200px;
            height: 200px;
            margin-left: auto;
            margin-right: auto;
        }

        .circular-progress svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .progress-circle {
            fill: none;
            stroke-width: 15;
            stroke-linecap: round;
        }

        .progress-background {
            stroke: #e1e5e9;
        }

        .progress-fill {
            stroke: url(#gradient);
            transition: stroke-dashoffset 0.5s ease;
        }

        .progress-text {
            position: absolute;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .progress-percentage {
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
        }

        .progress-label {
            font-size: 14px;
            color: #999;
        }

        .topic-breakdown {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .topic-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .topic-info {
            flex: 1;
        }

        .topic-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .progress-bar-container {
            background: #e1e5e9;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        .topic-percentage {
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
            min-width: 50px;
            text-align: right;
        }

        /* ========== MODAL STYLES ========== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.3s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 30px;
            border-bottom: 1px solid #e5e7eb;
        }

        .modal-header h2 {
            color: #333;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: #999;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: #f3f4f6;
            color: #666;
        }

        .add-flashcard-form {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .cancel-btn {
            background: #f3f4f6;
            color: #666;
            border: 2px solid #e5e7eb;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cancel-btn:hover {
            background: #e5e7eb;
            border-color: #d1d5db;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* ========== NOTIFICATION STYLES ========== */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-radius: 10px;
            padding: 15px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;

        function initializeSearchSuggestions() {
            const searchInput = document.getElementById('searchInput');
            const suggestionsContainer = document.getElementById('searchSuggestions');
            
            if (!searchInput || !suggestionsContainer) return;
            
            // Generate suggestions from sample data
            const allTakeaways = JSON.parse(localStorage.getItem('takeaways') || '[]');
            const topics = [...new Set(allTakeaways.map(t => t.topic))];
            const tags = [...new Set(allTakeaways.flatMap(t => t.tags || []))];
            
            // Create suggestion elements
            const topicSuggestions = topics.map(topic => 
                `<span class="suggestion-tag" onclick="addToSearch('${topic}')">${topic}</span>`
            ).join('');
            
            const tagSuggestions = tags.map(tag => 
                `<span class="suggestion-tag" onclick="addToSearch('${tag}')">${tag}</span>`
            ).join('');
            
            suggestionsContainer.innerHTML = `
                <div class="suggestion-group">
                    <strong>Topics:</strong> ${topicSuggestions}
                </div>
                <div class="suggestion-group">
                    <strong>Tags:</strong> ${tagSuggestions}
                </div>
            `;
        }

        function addToSearch(term) {
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.value = term;
                performSearch();
            }
        }

        // Get all takeaways
        function getAllTakeaways() {
            return JSON.parse(localStorage.getItem('takeaways')) || [];
        }

        // Get due flashcards (randomly shuffle for variety)
        function getDueFlashcards() {
            const takeaways = getAllTakeaways();
            return takeaways.sort(() => Math.random() - 0.5);
        }

        // Update takeaway after review
        function updateTakeaway(id, isRemembered) {
            const takeaways = getAllTakeaways();
            const takeaway = takeaways.find(t => t.id === id);
            if (takeaway) {
                takeaway.total += 1;
                if (isRemembered) {
                    takeaway.remembered += 1;
                }
                localStorage.setItem('takeaways', JSON.stringify(takeaways));
            }
        }

        /* ========== TAB SWITCHING ========== */
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tabName = this.getAttribute('data-tab');
                
                // Hide all tabs
                document.querySelectorAll('.tab-content').forEach(tab => {
                    tab.classList.remove('active');
                });
                
                // Remove active class from all buttons
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.classList.remove('active');
                });
                
                // Show selected tab
                document.getElementById(tabName).classList.add('active');
                this.classList.add('active');
                
                // Render appropriate content
                if (tabName === 'flashcards') {
                    renderFlashcards();
                } else if (tabName === 'knowledge-map') {
                    renderKnowledgeMap();
                } else if (tabName === 'retention') {
                    renderRetentionScore();
                }
            });
        });

        /* ========== FLASHCARD RENDERING ========== */
        function renderFlashcards() {
            const wrapper = document.getElementById('flashcardWrapper');
            const flashcards = getDueFlashcards();
            
            console.log('Rendering flashcards:', flashcards.length, 'cards found');
            console.log('Flashcards data:', flashcards);

            // Add a debug indicator
            wrapper.innerHTML = '<div style="background: yellow; padding: 10px; margin-bottom: 10px;">DEBUG: Found ' + flashcards.length + ' flashcards</div>';

            if (flashcards.length === 0) {
                wrapper.innerHTML += '<div class="no-flashcards">No flashcards to review! Great job! 🎉</div>';
                return;
            }

            wrapper.innerHTML = flashcards.map((card, index) => {
                const progressPercent = Math.round(((index + 1) / flashcards.length) * 100);
                return `
                <div class="flashcard" aria-live="polite" aria-label="Flashcard ${index + 1} of ${flashcards.length}">
                    <div class="flashcard-header">
                        <span class="flashcard-topic">${card.topic}</span>
                        <span class="flashcard-counter">${index + 1} / ${flashcards.length}</span>
                    </div>
                    <div class="flashcard-content">
                        <div>
                            <div class="flashcard-text">${card.text}</div>
                            ${card.source ? `<div class="flashcard-source">📖 Source: ${card.source}</div>` : ''}
                            <div class="progress-track"><div class="progress-track-fill" style="width: ${progressPercent}%"></div></div>
                        </div>
                    </div>
                    <div class="flashcard-buttons">
                        <button class="forgot-btn" onclick="handleReview(${card.id}, false)" aria-label="Forgot this card">
                            <i class="fas fa-times-circle"></i> Forgot
                        </button>
                        <button class="remembered-btn" onclick="handleReview(${card.id}, true)" aria-label="Remembered this card">
                            <i class="fas fa-check-circle"></i> Remembered
                        </button>
                    </div>
                </div>
            `; }).join('');
        }

        // Handle flashcard review
        function handleReview(id, isRemembered) {
            updateTakeaway(id, isRemembered);
            renderFlashcards(); // Re-render to show next card or empty state
        }

        /* ========== KNOWLEDGE MAP ========== */
        function renderKnowledgeMap() {
            const takeaways = getAllTakeaways();
            const topicMap = {};

            // Group by topic
            takeaways.forEach(t => {
                if (!topicMap[t.topic]) {
                    topicMap[t.topic] = {
                        count: 0,
                        remembered: 0,
                        icon: t.icon || '📖'
                    };
                }
                topicMap[t.topic].count += 1;
                topicMap[t.topic].remembered += t.remembered;
            });

            const grid = document.getElementById('knowledgeGrid');
            grid.innerHTML = Object.entries(topicMap).map(([topic, data]) => {
                const strength = data.remembered / (data.count * 10);
                let strengthClass = 'weak';
                let strengthLabel = 'Weak';
                
                if (strength >= 0.7) {
                    strengthClass = 'strong';
                    strengthLabel = 'Strong';
                } else if (strength >= 0.4) {
                    strengthClass = 'medium';
                    strengthLabel = 'Medium';
                }

                return `
                    <div class="knowledge-card ${strengthClass}">
                        <div class="knowledge-card-icon">${data.icon}</div>
                        <div class="knowledge-card-title">${topic}</div>
                        <div class="knowledge-card-count">${data.count} takeaway${data.count !== 1 ? 's' : ''}</div>
                        <div class="knowledge-card-strength">${strengthLabel} 💪</div>
                    </div>
                `;
            }).join('');
        }

        /* ========== SEARCH FUNCTIONALITY ========== */
        let currentFilter = 'all';
        let searchStartTime = 0;

        // Filter functionality
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.getAttribute('data-filter');
                performSearch();
            });
        });

        document.getElementById('searchBtn').addEventListener('click', performSearch);
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') performSearch();
        });

        document.getElementById('searchInput').addEventListener('input', function() {
            if (this.value.trim() === '') {
                document.getElementById('searchResults').innerHTML = '<div class="no-results"><i class="fas fa-search"></i>Start typing to search your knowledge base...</div>';
                document.getElementById('searchStats').style.display = 'none';
            }
        });

        function performSearch() {
            searchStartTime = performance.now();
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const takeaways = getAllTakeaways();

            if (!query) {
                document.getElementById('searchResults').innerHTML = '<div class="no-results"><i class="fas fa-search"></i>Enter a keyword to search...</div>';
                document.getElementById('searchStats').style.display = 'none';
                return;
            }

            // Filter by topic if filter is active
            let filteredTakeaways = takeaways;
            if (currentFilter !== 'all') {
                const filterMap = {
                    'memory': 'Memory Science',
                    'learning': 'Learning Techniques',
                    'sleep': 'Sleep Science',
                    'productivity': 'Productivity',
                    'psychology': 'Psychology'
                };
                const topicName = filterMap[currentFilter];
                filteredTakeaways = takeaways.filter(t => t.topic === topicName);
            }

            // Enhanced search algorithm
            const results = filteredTakeaways.map(takeaway => {
                const text = takeaway.text.toLowerCase();
                const topic = takeaway.topic.toLowerCase();
                const source = takeaway.source ? takeaway.source.toLowerCase() : '';

                // Calculate relevance score
                let score = 0;
                let matches = [];

                // Exact phrase match gets highest score
                if (text.includes(query)) {
                    score += 10;
                    matches.push('text');
                }

                // Topic match
                if (topic.includes(query)) {
                    score += 8;
                    matches.push('topic');
                }

                // Source match
                if (source.includes(query)) {
                    score += 6;
                    matches.push('source');
                }

                // Word-by-word matching for partial matches
                const queryWords = query.split(' ');
                queryWords.forEach(word => {
                    if (word.length > 2) { // Ignore very short words
                        if (text.includes(word)) score += 3;
                        if (topic.includes(word)) score += 2;
                        if (source.includes(word)) score += 1;
                    }
                });

                return {
                    ...takeaway,
                    score: score,
                    matches: matches
                };
            }).filter(item => item.score > 0)
              .sort((a, b) => b.score - a.score); // Sort by relevance

            const searchTime = Math.round(performance.now() - searchStartTime);
            const resultsDiv = document.getElementById('searchResults');
            const statsDiv = document.getElementById('searchStats');

            // Update stats
            document.getElementById('resultsCount').textContent = `${results.length} result${results.length !== 1 ? 's' : ''} found`;
            document.getElementById('searchTime').textContent = `Search took ${searchTime}ms`;
            statsDiv.style.display = 'flex';

            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results"><i class="fas fa-search-minus"></i>No results found for "' + query + '"<br><small>Try different keywords or check your filter</small></div>';
                return;
            }

            // Highlight search terms in results
            function highlightText(text, query) {
                if (!query) return text;
                const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                return text.replace(regex, '<mark>$1</mark>');
            }

            resultsDiv.innerHTML = results.map(result => {
                const retentionPercent = Math.round((result.remembered / result.total) * 100);
                let retentionClass = 'low';
                if (retentionPercent >= 70) retentionClass = 'high';
                else if (retentionPercent >= 40) retentionClass = 'medium';

                return `
                    <div class="result-card">
                        <span class="result-card-topic">${result.topic}</span>
                        <div class="result-card-text">${highlightText(result.text, query)}</div>
                        ${result.source ? `<div class="result-card-source">📖 ${highlightText(result.source, query)}</div>` : ''}
                        <div class="result-card-stats">
                            <span class="retention-badge ${retentionClass}">Retention: ${retentionPercent}%</span>
                            <span style="font-size: 11px; color: #999;">${result.remembered}/${result.total} reviews</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Initialize search when page loads
        window.addEventListener('load', function() {
            initializeData();
            initializeSearchSuggestions();
            renderFlashcards();
        });

        /* ========== RETENTION SCORE ========== */
        function renderRetentionScore() {
            const takeaways = getAllTakeaways();

            // Calculate overall score
            let totalRemembered = 0;
            let totalAttempts = 0;
            const topicScores = {};

            takeaways.forEach(t => {
                totalRemembered += t.remembered;
                totalAttempts += t.total;

                if (!topicScores[t.topic]) {
                    topicScores[t.topic] = { remembered: 0, total: 0 };
                }
                topicScores[t.topic].remembered += t.remembered;
                topicScores[t.topic].total += t.total;
            });

            const overallPercentage = totalAttempts > 0 ? Math.round((totalRemembered / totalAttempts) * 100) : 0;

            // Update circular progress
            document.getElementById('overallPercentage').textContent = overallPercentage + '%';
            const circumference = 2 * Math.PI * 90;
            const offset = circumference - (overallPercentage / 100) * circumference;
            document.getElementById('progressCircle').style.strokeDasharray = circumference;
            document.getElementById('progressCircle').style.strokeDashoffset = offset;

            // Render topic breakdown
            const breakdown = document.getElementById('topicBreakdown');
            breakdown.innerHTML = Object.entries(topicScores).map(([topic, scores]) => {
                const percentage = scores.total > 0 ? Math.round((scores.remembered / scores.total) * 100) : 0;
                return `
                    <div class="topic-item">
                        <div class="topic-info">
                            <div class="topic-name">${topic}</div>
                            <div class="progress-bar-container">
                                <div class="progress-bar-fill" style="width: ${percentage}%"></div>
                            </div>
                        </div>
                        <div class="topic-percentage">${percentage}%</div>
                    </div>
                `;
            }).join('');

            // Update streak display
            updateStreak();
        }

        /* ========== STREAK CALCULATION ========== */
        function updateStreak() {
            const lastReviewDate = new Date(localStorage.getItem('lastReviewDate') || new Date());
            const today = new Date();
            const diffTime = Math.abs(today - lastReviewDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            let streak = parseInt(localStorage.getItem('streak') || 0);
            
            if (diffDays === 0) {
                streak += 1;
            } else if (diffDays === 1) {
                streak += 1;
            } else {
                streak = 1;
            }

            localStorage.setItem('streak', streak);
            localStorage.setItem('lastReviewDate', today.toISOString());
            document.getElementById('streakDisplay').textContent = `🔥 ${streak} Day Streak`;
        }

        /* ========== ADD FLASHCARD FUNCTIONALITY ========== */
        function showAddFlashcardModal() {
            const modal = document.getElementById('addFlashcardModal');
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            
            // Focus on the first input
            setTimeout(() => {
                document.getElementById('flashcardText').focus();
            }, 100);
        }

        function hideAddFlashcardModal() {
            const modal = document.getElementById('addFlashcardModal');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
            
            // Reset form
            document.getElementById('addFlashcardForm').reset();
            document.getElementById('customTopicGroup').style.display = 'none';
        }

        // Handle topic selection change
        document.getElementById('flashcardTopic').addEventListener('change', function() {
            const customTopicGroup = document.getElementById('customTopicGroup');
            if (this.value === 'Custom') {
                customTopicGroup.style.display = 'block';
                document.getElementById('customTopic').required = true;
            } else {
                customTopicGroup.style.display = 'none';
                document.getElementById('customTopic').required = false;
            }
        });

        // Handle form submission
        document.getElementById('addFlashcardForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            let topic = formData.get('topic');
            
            // Handle custom topic
            if (topic === 'Custom') {
                topic = formData.get('customTopic').trim();
                if (!topic) {
                    alert('Please enter a custom topic name.');
                    return;
                }
            }
            
            // Get all existing takeaways to generate new ID
            const takeaways = getAllTakeaways();
            const newId = Math.max(...takeaways.map(t => t.id), 0) + 1;
            
            // Parse tags
            const tagsInput = formData.get('tags');
            const tags = tagsInput ? tagsInput.split(',').map(tag => tag.trim()).filter(tag => tag) : [];
            
            // Create new flashcard
            const newFlashcard = {
                id: newId,
                text: formData.get('text').trim(),
                topic: topic,
                source: formData.get('source').trim() || null,
                tags: tags,
                remembered: 0,
                total: 0,
                icon: getTopicIcon(topic)
            };
            
            // Add to localStorage
            takeaways.push(newFlashcard);
            localStorage.setItem('takeaways', JSON.stringify(takeaways));
            
            // Debug: Check if data was saved
            console.log('New flashcard added:', newFlashcard);
            console.log('Total flashcards now:', takeaways.length);
            console.log('localStorage takeaways:', JSON.parse(localStorage.getItem('takeaways') || '[]').length);
            
            // Hide modal and refresh flashcards
            hideAddFlashcardModal();
            setTimeout(() => {
                // Switch to flashcards tab if not already active
                const flashcardsTab = document.getElementById('flashcards');
                if (!flashcardsTab.classList.contains('active')) {
                    // Simulate clicking the flashcards tab button
                    document.querySelector('[data-tab="flashcards"]').click();
                    console.log('Switched to flashcards tab');
                } else {
                    renderFlashcards();
                    console.log('Flashcards re-rendered (already on tab)');
                }
            }, 100);
            
            // Show success message
            showNotification('Flashcard added successfully!', 'success');
        });

        // Get appropriate icon for topic
        function getTopicIcon(topic) {
            const iconMap = {
                'Memory Science': '🧠',
                'Learning Techniques': '📚',
                'Sleep Science': '😴',
                'Productivity': '⏰',
                'Psychology': '🧠'
            };
            return iconMap[topic] || '💡';
        }

        // Show notification
        function showNotification(message, type = 'success') {
            // Create notification element
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                ${message}
            `;
            
            // Add to page
            document.body.appendChild(notification);
            
            // Show notification
            setTimeout(() => notification.classList.add('show'), 100);
            
            // Remove after 3 seconds
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => document.body.removeChild(notification), 300);
            }, 3000);
        }

        // Close modal when clicking outside
        document.getElementById('addFlashcardModal').addEventListener('click', function(e) {
            if (e.target === this) {
                hideAddFlashcardModal();
            }
        });

        // Close modal with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && document.getElementById('addFlashcardModal').style.display === 'flex') {
                hideAddFlashcardModal();
            }
        });

    </script>

    <!-- Add Flashcard Modal -->
    <div id="addFlashcardModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-plus"></i> Add New Flashcard</h2>
                <button class="modal-close" onclick="hideAddFlashcardModal()" aria-label="Close modal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="addFlashcardForm" class="add-flashcard-form">
                <div class="form-group">
                    <label for="flashcardText">Flashcard Text *</label>
                    <textarea id="flashcardText" name="text" required placeholder="Enter the key takeaway or concept you want to remember..." rows="4"></textarea>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="flashcardTopic">Topic *</label>
                        <select id="flashcardTopic" name="topic" required>
                            <option value="">Select a topic</option>
                            <option value="Memory Science">Memory Science</option>
                            <option value="Learning Techniques">Learning Techniques</option>
                            <option value="Sleep Science">Sleep Science</option>
                            <option value="Productivity">Productivity</option>
                            <option value="Psychology">Psychology</option>
                            <option value="Custom">Custom Topic</option>
                        </select>
                    </div>
                    
                    <div class="form-group" id="customTopicGroup" style="display: none;">
                        <label for="customTopic">Custom Topic Name</label>
                        <input type="text" id="customTopic" name="customTopic" placeholder="Enter custom topic name">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="flashcardSource">Source (Optional)</label>
                    <input type="text" id="flashcardSource" name="source" placeholder="Book, article, course, or personal note">
                </div>
                
                <div class="form-group">
                    <label for="flashcardTags">Tags (Optional)</label>
                    <input type="text" id="flashcardTags" name="tags" placeholder="Comma-separated tags (e.g., spaced repetition, neuroscience)">
                </div>
                
                <div class="form-actions">
                    <button type="button" class="cancel-btn" onclick="hideAddFlashcardModal()">Cancel</button>
                    <button type="submit" class="submit-btn">Add Flashcard</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
