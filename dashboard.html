<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recallify - Knowledge Retention Dashboard</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ========== RESET AND BASE STYLES ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        /* ========== HEADER ========== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 40px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 28px;
            color: #4facfe;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info a {
            background: #4facfe;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .user-info a:hover {
            background: #3a9cfe;
            transform: translateY(-2px);
        }

        /* ========== MAIN CONTAINER ========== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ========== TABS ========== */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.8);
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #555;
        }

        .tab-btn.active {
            background: white;
            color: #4facfe;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .tab-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        /* ========== TAB CONTENT ========== */
        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== FLASHCARD SECTION ========== */
        .flashcard-wrapper {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        .flashcard {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .flashcard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .flashcard-topic {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .flashcard-counter {
            color: #999;
            font-size: 14px;
            font-weight: 500;
        }

        .flashcard-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }

        .flashcard-text {
            font-size: 20px;
            color: #333;
            line-height: 1.6;
            text-align: center;
        }

        .flashcard-source {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
            font-style: italic;
        }

        .flashcard-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .forgot-btn, .remembered-btn {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .forgot-btn {
            background: #fee;
            color: #e53e3e;
        }

        .forgot-btn:hover {
            background: #fdd;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229, 62, 62, 0.3);
        }

        .remembered-btn {
            background: #efe;
            color: #38a169;
        }

        .remembered-btn:hover {
            background: #dfd;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 161, 105, 0.3);
        }

        .no-flashcards {
            background: white;
            border-radius: 15px;
            padding: 60px 40px;
            text-align: center;
            color: #999;
            font-size: 18px;
        }

        /* ========== KNOWLEDGE MAP ========== */
        .knowledge-map {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .knowledge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .knowledge-card {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            color: white;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .knowledge-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .knowledge-card.weak {
            background: linear-gradient(135deg, #f59e0b 0%, #f97316 100%);
        }

        .knowledge-card.medium {
            background: linear-gradient(135deg, #3b82f6 0%, #4facfe 100%);
        }

        .knowledge-card.strong {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .knowledge-card-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .knowledge-card-title {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .knowledge-card-count {
            font-size: 12px;
            opacity: 0.9;
        }

        .knowledge-card-strength {
            font-size: 11px;
            margin-top: 8px;
            opacity: 0.8;
        }

        /* ========== SEARCH SECTION ========== */
        .search-container {
            background: white;
            border-radius: 15px;
            padding: 30px 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .search-input-wrapper {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .search-input-wrapper input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .search-input-wrapper input:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }

        .search-input-wrapper button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-input-wrapper button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }

        .search-results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .result-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #4facfe;
            transition: all 0.3s ease;
        }

        .result-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .result-card-topic {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 10px;
        }

        .result-card-text {
            font-size: 14px;
            line-height: 1.5;
            color: #555;
            margin: 10px 0;
        }

        .result-card-source {
            font-size: 12px;
            color: #999;
            font-style: italic;
        }

        .no-results {
            text-align: center;
            color: #999;
            padding: 40px;
            font-size: 18px;
        }

        /* ========== RETENTION SCORE SECTION ========== */
        .retention-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .retention-card {
            background: white;
            border-radius: 15px;
            padding: 30px 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .retention-card h3 {
            margin-bottom: 25px;
            color: #333;
            font-size: 18px;
        }

        .circular-progress {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 30px 0;
            position: relative;
            width: 200px;
            height: 200px;
            margin-left: auto;
            margin-right: auto;
        }

        .circular-progress svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .progress-circle {
            fill: none;
            stroke-width: 15;
            stroke-linecap: round;
        }

        .progress-background {
            stroke: #e1e5e9;
        }

        .progress-fill {
            stroke: url(#gradient);
            transition: stroke-dashoffset 0.5s ease;
        }

        .progress-text {
            position: absolute;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .progress-percentage {
            font-size: 48px;
            font-weight: 700;
            color: #4facfe;
        }

        .progress-label {
            font-size: 14px;
            color: #999;
        }

        .topic-breakdown {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .topic-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .topic-info {
            flex: 1;
        }

        .topic-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .progress-bar-container {
            background: #e1e5e9;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        .topic-percentage {
            font-size: 14px;
            font-weight: 600;
            color: #4facfe;
            min-width: 50px;
            text-align: right;
        }

        /* ========== QUIZ STYLES ========== */
        .quiz-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .quiz-question {
            font-size: 20px;
            margin-bottom: 25px;
            color: #333;
            font-weight: 600;
            line-height: 1.6;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .quiz-option {
            background: #f8f9fa;
            padding: 18px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            font-size: 16px;
        }

        .quiz-option:hover {
            background: #e1e5e9;
            transform: translateX(5px);
        }

        .quiz-option.correct {
            border-color: #38a169;
            background: #e6ffed;
        }

        .quiz-option.incorrect {
            border-color: #e53e3e;
            background: #ffe6e6;
        }

        .quiz-feedback {
            margin-top: 20px;
            padding: 15px;
            font-size: 16px;
            font-weight: 600;
            color: #555;
            border-radius: 10px;
            background: #f8f9fa;
        }

        .quiz-next-btn {
            margin-top: 30px;
            padding: 15px 30px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
        }

        .quiz-next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }

        .quiz-complete {
            text-align: center;
            padding: 40px;
        }

        .quiz-complete h3 {
            font-size: 32px;
            color: #4facfe;
            margin-bottom: 20px;
        }

        .quiz-score {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }

        /* ========== RESPONSIVE DESIGN ========== */
        @media (max-width: 1024px) {
            .retention-wrapper {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                gap: 20px;
                padding: 20px;
            }

            .search-results {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            header h1 {
                font-size: 22px;
            }

            .flashcard {
                padding: 25px 20px;
                min-height: 250px;
            }

            .flashcard-text {
                font-size: 16px;
            }

            .flashcard-buttons {
                flex-direction: column;
            }

            .knowledge-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .retention-card {
                padding: 25px 20px;
            }

            .search-input-wrapper {
                flex-direction: column;
            }

            .circular-progress {
                width: 150px;
                height: 150px;
            }

            .progress-percentage {
                font-size: 36px;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 15px;
            }

            header h1 {
                font-size: 18px;
            }

            .flashcard {
                padding: 20px 15px;
            }

            .knowledge-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                gap: 5px;
            }

            .tab-btn {
                padding: 10px 15px;
                font-size: 14px;
            }

            .user-info a {
                padding: 8px 15px;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <h1><i class="fas fa-brain"></i> Recallify Dashboard</h1>
        <div class="user-info">
            <span id="streakDisplay">🔥 0 Day Streak</span>
            <a href="login.html">Logout</a>
        </div>
    </header>

    <!-- MAIN CONTAINER -->
    <div class="container">
        <!-- TABS -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="flashcards">
                <i class="fas fa-layer-group"></i> Flashcards
            </button>
            <button class="tab-btn" data-tab="knowledge-map">
                <i class="fas fa-map"></i> Knowledge Map
            </button>
            <button class="tab-btn" data-tab="search">
                <i class="fas fa-search"></i> Search
            </button>
            <button class="tab-btn" data-tab="retention">
                <i class="fas fa-chart-pie"></i> Retention Score
            </button>
            <button class="tab-btn" data-tab="quiz">
                <i class="fas fa-question-circle"></i> Quiz
            </button>
        </div>

        <!-- FLASHCARDS TAB -->
        <div id="flashcards" class="tab-content active">
            <div id="flashcardWrapper" class="flashcard-wrapper"></div>
        </div>

        <!-- KNOWLEDGE MAP TAB -->
        <div id="knowledge-map" class="tab-content">
            <div class="knowledge-map">
                <h2><i class="fas fa-sitemap"></i> Your Knowledge Map</h2>
                <div id="knowledgeGrid" class="knowledge-grid"></div>
            </div>
        </div>

        <!-- SEARCH TAB -->
        <div id="search" class="tab-content">
            <div class="search-container">
                <div class="search-input-wrapper">
                    <input type="text" id="searchInput" placeholder="Search by keyword or topic...">
                    <button id="searchBtn"><i class="fas fa-search"></i> Search</button>
                </div>
                <div id="searchResults" class="search-results"></div>
            </div>
        </div>

        <!-- QUIZ TAB -->
        <div id="quiz" class="tab-content">
            <div class="quiz-container">
                <h2><i class="fas fa-question-circle"></i> Quiz Time!</h2>
                <div id="quizWrapper">
                    <!-- Quiz content will be dynamically rendered here -->
                </div>
            </div>
        </div>

        <!-- RETENTION SCORE TAB -->
        <div id="retention" class="tab-content">
            <div class="retention-wrapper">
                <!-- Overall Score -->
                <div class="retention-card">
                    <h3><i class="fas fa-chart-line"></i> Overall Retention Score</h3>
                    <div class="circular-progress">
                        <svg viewBox="0 0 200 200">
                            <defs>
                                <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
                                </linearGradient>
                            </defs>
                            <circle class="progress-circle progress-background" cx="100" cy="100" r="90"></circle>
                            <circle class="progress-circle progress-fill" id="progressCircle" cx="100" cy="100" r="90"></circle>
                        </svg>
                        <div class="progress-text">
                            <div class="progress-percentage" id="overallPercentage">0%</div>
                            <div class="progress-label">Recalled</div>
                        </div>
                    </div>
                </div>

                <!-- Topic Breakdown -->
                <div class="retention-card">
                    <h3><i class="fas fa-tags"></i> By Topic</h3>
                    <div id="topicBreakdown" class="topic-breakdown"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* ========== DATA MANAGEMENT ========== */
        // Initialize sample data in localStorage if not exists
        function initializeData() {
            if (!localStorage.getItem('takeaways')) {
                const sampleData = [
                    {
                        id: 1,
                        text: 'The Ebbinghaus forgetting curve shows we forget ~50% of new info within 1 hour without review.',
                        topic: 'Memory Science',
                        source: 'Cognitive Psychology 101',
                        remembered: 8,
                        total: 10,
                        icon: '🧠'
                    },
                    {
                        id: 2,
                        text: 'Spaced repetition increases retention by 200% compared to massed practice.',
                        topic: 'Learning Techniques',
                        source: 'The Learning Scientists',
                        remembered: 9,
                        total: 10,
                        icon: '📚'
                    },
                    {
                        id: 3,
                        text: 'Active recall is 5x more effective than passive rereading for long-term retention.',
                        topic: 'Learning Techniques',
                        source: 'Make It Stick',
                        remembered: 7,
                        total: 10,
                        icon: '📚'
                    },
                    {
                        id: 4,
                        text: 'Sleep consolidates memories, increasing retention by up to 30% overnight.',
                        topic: 'Sleep Science',
                        source: 'Why We Sleep',
                        remembered: 6,
                        total: 10,
                        icon: '😴'
                    },
                    {
                        id: 5,
                        text: 'Interleaving different topics while studying improves problem-solving skills by 20%.',
                        topic: 'Learning Techniques',
                        source: 'Apply Psychology Research',
                        remembered: 5,
                        total: 10,
                        icon: '📚'
                    },
                    {
                        id: 6,
                        text: 'The primacy effect causes us to remember first items 40% better than middle ones.',
                        topic: 'Memory Science',
                        source: 'Cognitive Psychology 101',
                        remembered: 4,
                        total: 10,
                        icon: '🧠'
                    },
                    {
                        id: 7,
                        text: 'Elaborative encoding (connecting new info to existing knowledge) doubles retention rates.',
                        topic: 'Memory Science',
                        source: 'Learning How to Learn',
                        remembered: 8,
                        total: 10,
                        icon: '🧠'
                    },
                    {
                        id: 8,
                        text: 'Retrieval practice via testing improves retention by 30% more than studying notes.',
                        topic: 'Learning Techniques',
                        source: 'Improving Students Learning',
                        remembered: 9,
                        total: 10,
                        icon: '📚'
                    }
                ];
                localStorage.setItem('takeaways', JSON.stringify(sampleData));
                localStorage.setItem('currentFlashcardIndex', '0');
                localStorage.setItem('lastReviewDate', new Date().toISOString());
            }
        }

        // Get all takeaways
        function getAllTakeaways() {
            return JSON.parse(localStorage.getItem('takeaways')) || [];
        }

        // Get due flashcards (randomly shuffle for variety)
        function getDueFlashcards() {
            const takeaways = getAllTakeaways();
            return takeaways.sort(() => Math.random() - 0.5);
        }

        // Update takeaway after review
        function updateTakeaway(id, isRemembered) {
            const takeaways = getAllTakeaways();
            const takeaway = takeaways.find(t => t.id === id);
            if (takeaway) {
                takeaway.total += 1;
                if (isRemembered) {
                    takeaway.remembered += 1;
                }
                localStorage.setItem('takeaways', JSON.stringify(takeaways));
            }
        }

        /* ========== TAB SWITCHING ========== */
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const tabName = this.getAttribute('data-tab');
                
                // Hide all tabs
                document.querySelectorAll('.tab-content').forEach(tab => {
                    tab.classList.remove('active');
                });
                
                // Remove active class from all buttons
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.classList.remove('active');
                });
                
                // Show selected tab
                document.getElementById(tabName).classList.add('active');
                this.classList.add('active');
                
                // Render appropriate content
                if (tabName === 'flashcards') {
                    renderFlashcards();
                } else if (tabName === 'knowledge-map') {
                    renderKnowledgeMap();
                } else if (tabName === 'retention') {
                    renderRetentionScore();
                } else if (tabName === 'quiz') {
                    renderQuiz();
                }
            });
        });

        /* ========== FLASHCARD RENDERING ========== */
        function renderFlashcards() {
            const wrapper = document.getElementById('flashcardWrapper');
            const flashcards = getDueFlashcards();

            if (flashcards.length === 0) {
                wrapper.innerHTML = '<div class="no-flashcards">No flashcards to review! Great job! 🎉</div>';
                return;
            }

            wrapper.innerHTML = flashcards.map((card, index) => `
                <div class="flashcard">
                    <div class="flashcard-header">
                        <span class="flashcard-topic">${card.topic}</span>
                        <span class="flashcard-counter">${index + 1} of ${flashcards.length}</span>
                    </div>
                    <div class="flashcard-content">
                        <div>
                            <div class="flashcard-text">${card.text}</div>
                            ${card.source ? `<div class="flashcard-source">📖 Source: ${card.source}</div>` : ''}
                        </div>
                    </div>
                    <div class="flashcard-buttons">
                        <button class="forgot-btn" onclick="handleReview(${card.id}, false)">
                            <i class="fas fa-times-circle"></i> Forgot
                        </button>
                        <button class="remembered-btn" onclick="handleReview(${card.id}, true)">
                            <i class="fas fa-check-circle"></i> Remembered
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Handle flashcard review
        function handleReview(id, isRemembered) {
            updateTakeaway(id, isRemembered);
            renderFlashcards(); // Re-render to show next card or empty state
        }

        /* ========== KNOWLEDGE MAP ========== */
        function renderKnowledgeMap() {
            const takeaways = getAllTakeaways();
            const topicMap = {};

            // Group by topic
            takeaways.forEach(t => {
                if (!topicMap[t.topic]) {
                    topicMap[t.topic] = {
                        count: 0,
                        remembered: 0,
                        icon: t.icon || '📖'
                    };
                }
                topicMap[t.topic].count += 1;
                topicMap[t.topic].remembered += t.remembered;
            });

            const grid = document.getElementById('knowledgeGrid');
            grid.innerHTML = Object.entries(topicMap).map(([topic, data]) => {
                const strength = data.remembered / (data.count * 10);
                let strengthClass = 'weak';
                let strengthLabel = 'Weak';
                
                if (strength >= 0.7) {
                    strengthClass = 'strong';
                    strengthLabel = 'Strong';
                } else if (strength >= 0.4) {
                    strengthClass = 'medium';
                    strengthLabel = 'Medium';
                }

                return `
                    <div class="knowledge-card ${strengthClass}">
                        <div class="knowledge-card-icon">${data.icon}</div>
                        <div class="knowledge-card-title">${topic}</div>
                        <div class="knowledge-card-count">${data.count} takeaway${data.count !== 1 ? 's' : ''}</div>
                        <div class="knowledge-card-strength">${strengthLabel} 💪</div>
                    </div>
                `;
            }).join('');
        }

        /* ========== SEARCH FUNCTIONALITY ========== */
        document.getElementById('searchBtn').addEventListener('click', performSearch);
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') performSearch();
        });

        function performSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const takeaways = getAllTakeaways();

            if (!query) {
                document.getElementById('searchResults').innerHTML = '<div class="no-results">Enter a keyword to search...</div>';
                return;
            }

            const results = takeaways.filter(t =>
                t.text.toLowerCase().includes(query) ||
                t.topic.toLowerCase().includes(query) ||
                t.source.toLowerCase().includes(query)
            );

            const resultsDiv = document.getElementById('searchResults');
            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results">No results found for "' + query + '"</div>';
                return;
            }

            resultsDiv.innerHTML = results.map(result => `
                <div class="result-card">
                    <span class="result-card-topic">${result.topic}</span>
                    <div class="result-card-text">${result.text}</div>
                    ${result.source ? `<div class="result-card-source">📖 ${result.source}</div>` : ''}
                    <div style="margin-top: 10px; font-size: 12px; color: #4facfe;">
                        Retention: ${Math.round((result.remembered / result.total) * 100)}% (${result.remembered}/${result.total})
                    </div>
                </div>
            `).join('');
        }

        /* ========== RETENTION SCORE ========== */
        function renderRetentionScore() {
            const takeaways = getAllTakeaways();

            // Calculate overall score
            let totalRemembered = 0;
            let totalAttempts = 0;
            const topicScores = {};

            takeaways.forEach(t => {
                totalRemembered += t.remembered;
                totalAttempts += t.total;

                if (!topicScores[t.topic]) {
                    topicScores[t.topic] = { remembered: 0, total: 0 };
                }
                topicScores[t.topic].remembered += t.remembered;
                topicScores[t.topic].total += t.total;
            });

            const overallPercentage = totalAttempts > 0 ? Math.round((totalRemembered / totalAttempts) * 100) : 0;

            // Update circular progress
            document.getElementById('overallPercentage').textContent = overallPercentage + '%';
            const circumference = 2 * Math.PI * 90;
            const offset = circumference - (overallPercentage / 100) * circumference;
            document.getElementById('progressCircle').style.strokeDasharray = circumference;
            document.getElementById('progressCircle').style.strokeDashoffset = offset;

            // Render topic breakdown
            const breakdown = document.getElementById('topicBreakdown');
            breakdown.innerHTML = Object.entries(topicScores).map(([topic, scores]) => {
                const percentage = scores.total > 0 ? Math.round((scores.remembered / scores.total) * 100) : 0;
                return `
                    <div class="topic-item">
                        <div class="topic-info">
                            <div class="topic-name">${topic}</div>
                            <div class="progress-bar-container">
                                <div class="progress-bar-fill" style="width: ${percentage}%"></div>
                            </div>
                        </div>
                        <div class="topic-percentage">${percentage}%</div>
                    </div>
                `;
            }).join('');

            // Update streak display
            updateStreak();
        }

        /* ========== STREAK CALCULATION ========== */
        function updateStreak() {
            const lastReviewDate = new Date(localStorage.getItem('lastReviewDate') || new Date());
            const today = new Date();
            const diffTime = Math.abs(today - lastReviewDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            let streak = parseInt(localStorage.getItem('streak') || 0);
            
            if (diffDays === 0) {
                streak += 1;
            } else if (diffDays === 1) {
                streak += 1;
            } else {
                streak = 1;
            }

            localStorage.setItem('streak', streak);
            localStorage.setItem('lastReviewDate', today.toISOString());
            document.getElementById('streakDisplay').textContent = `🔥 ${streak} Day Streak`;
        }

        /* ========== QUIZ FUNCTIONALITY ========== */
        const quizData = [
            {
                question: "What is the forgetting curve?",
                options: [
                    "A graph showing memory retention over time",
                    "A method to improve memory",
                    "A type of learning technique",
                    "A curve used in mathematics"
                ],
                correct: 0
            },
            {
                question: "What is spaced repetition?",
                options: [
                    "Studying the same topic repeatedly in one session",
                    "Reviewing information at increasing intervals",
                    "Reading notes passively",
                    "Highlighting important points"
                ],
                correct: 1
            },
            {
                question: "What does active recall involve?",
                options: [
                    "Rereading notes",
                    "Testing yourself on learned material",
                    "Highlighting key points",
                    "Listening to lectures"
                ],
                correct: 1
            },
            {
                question: "How much information do we typically forget within 1 hour without review?",
                options: [
                    "Around 20%",
                    "Around 50%",
                    "Around 80%",
                    "Around 90%"
                ],
                correct: 1
            },
            {
                question: "Which learning technique is 5x more effective than passive rereading?",
                options: [
                    "Highlighting",
                    "Note-taking",
                    "Active recall",
                    "Summarizing"
                ],
                correct: 2
            }
        ];

        let currentQuizIndex = 0;
        let quizScore = 0;

        /* Render Quiz */
        function renderQuiz() {
            const quizWrapper = document.getElementById('quizWrapper');
            
            if (currentQuizIndex >= quizData.length) {
                showQuizResults();
                return;
            }

            const quiz = quizData[currentQuizIndex];
            const questionNumber = currentQuizIndex + 1;

            quizWrapper.innerHTML = `
                <div style="margin-bottom: 20px; color: #4facfe; font-weight: 600;">
                    Question ${questionNumber} of ${quizData.length}
                </div>
                <div class="quiz-question">${quiz.question}</div>
                <div class="quiz-options">
                    ${quiz.options.map((option, index) => `
                        <div class="quiz-option" onclick="checkAnswer(${index})">${option}</div>
                    `).join('')}
                </div>
                <div class="quiz-feedback" id="quizFeedback" style="display: none;"></div>
                <button class="quiz-next-btn" id="nextQuizBtn" style="display: none;" onclick="nextQuiz()">
                    ${questionNumber < quizData.length ? 'Next Question' : 'See Results'} <i class="fas fa-arrow-right"></i>
                </button>
            `;
        }

        /* Check Answer */
        function checkAnswer(selectedIndex) {
            const quiz = quizData[currentQuizIndex];
            const options = document.querySelectorAll('.quiz-option');
            const feedback = document.getElementById('quizFeedback');

            // Disable all options
            options.forEach((option, index) => {
                option.onclick = null;
                if (index === quiz.correct) {
                    option.classList.add('correct');
                } else if (index === selectedIndex) {
                    option.classList.add('incorrect');
                }
            });

            // Update score
            if (selectedIndex === quiz.correct) {
                quizScore++;
                feedback.innerHTML = '<i class="fas fa-check-circle" style="color: #38a169;"></i> Correct! Great job! 🎉';
                feedback.style.color = '#38a169';
            } else {
                feedback.innerHTML = `<i class="fas fa-times-circle" style="color: #e53e3e;"></i> Incorrect. The correct answer is: "${quiz.options[quiz.correct]}"`;
                feedback.style.color = '#e53e3e';
            }

            feedback.style.display = 'block';
            document.getElementById('nextQuizBtn').style.display = 'block';
        }

        /* Next Quiz */
        function nextQuiz() {
            currentQuizIndex++;
            renderQuiz();
        }

        /* Show Quiz Results */
        function showQuizResults() {
            const quizWrapper = document.getElementById('quizWrapper');
            const percentage = Math.round((quizScore / quizData.length) * 100);
            
            let message = '';
            let emoji = '';
            if (percentage === 100) {
                message = 'Perfect Score!';
                emoji = '🏆';
            } else if (percentage >= 80) {
                message = 'Excellent Work!';
                emoji = '🌟';
            } else if (percentage >= 60) {
                message = 'Good Job!';
                emoji = '👍';
            } else {
                message = 'Keep Practicing!';
                emoji = '📚';
            }

            quizWrapper.innerHTML = `
                <div class="quiz-complete">
                    <div style="font-size: 80px; margin-bottom: 20px;">${emoji}</div>
                    <h3>${message}</h3>
                    <div class="quiz-score">${quizScore}/${quizData.length}</div>
                    <div style="font-size: 18px; color: #666; margin-bottom: 30px;">
                        You scored ${percentage}%
                    </div>
                    <button class="quiz-next-btn" onclick="restartQuiz()">
                        <i class="fas fa-redo"></i> Retake Quiz
                    </button>
                </div>
            `;
        }

        /* Restart Quiz */
        function restartQuiz() {
            currentQuizIndex = 0;
            quizScore = 0;
            renderQuiz();
        }

        /* ========== INITIALIZATION ========== */
        window.addEventListener('load', function() {
            initializeData();
            renderFlashcards();
        });
    </script>
</body>
</html>
